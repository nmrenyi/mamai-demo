<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAM-AI — Clinical Decision Support (Demonstration)</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div id="app" class="app">
  <header class="topbar">
    <div class="brand">MAM-AI <span class="badge small">DEMO</span></div>
    <div class="stack-meta" id="stack-meta"></div>
    <button id="reset-btn" class="ghost" title="Start a new conversation">New chat</button>
  </header>

  <div class="caveat-banner" id="caveat-banner"></div>

  <main id="chat" class="chat">
    <div class="empty-state" id="empty-state">
      <h2>Ask a clinical question</h2>
      <p>e.g. management of postpartum haemorrhage, neonatal resuscitation steps, pre-eclampsia thresholds.</p>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </main>

  <footer class="composer">
    <textarea id="input" rows="1" placeholder="Type a clinical question…"></textarea>
    <button id="retrieval-toggle" class="retrieval-toggle on"
            title="Retrieval (RAG) is on: answers are grounded in the retrieved guideline chunks. Tap to turn off and let the model answer from its own knowledge — matches the on-device app's search toggle.">Search: ON</button>
    <button id="send-btn">Send</button>
  </footer>
</div>

<script src="/static/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
